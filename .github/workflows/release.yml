name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # 你如果推 tag，GitHub Actions 会自动得到 ${{ github.ref_name }}。
        # git tag v1.2.3
        # git push origin v1.2.3
      - name: Set VERSION env
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.23.4"

      - name: Build binaries
        run: |
          mkdir -p build
          go mod tidy
          GOOS=windows GOARCH=amd64 go build -o build/navigo-${{ env.VERSION }}-win.exe main.go
          GOOS=linux   GOARCH=amd64 go build -o build/navigo-${{ env.VERSION }}-linux main.go
      - name: Prepare binary for Docker
        run: |
          cp build/navigo-${{ env.VERSION }}-linux navigo-linux

      - name: Generate sha256
        run: |
          cd build
          sha256sum navigo-${{ env.VERSION }}-win.exe   > navigo-${{ env.VERSION }}-win.exe.sha256
          sha256sum navigo-${{ env.VERSION }}-linux     > navigo-${{ env.VERSION }}-linux.sha256

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/navigo-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # ============================
      # Docker Hub 推送开始
      # ============================

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          # 推荐用PAT而非密码
          password: ${{ secrets.DOCKER_HUB_TOKEN }} 
          
      - name: Set build timestamp
        run: |
          TS=$(date '+%Y-%m-%dT%H_%M_%S')
          echo "BUILD_TS=$TS" >> $GITHUB_ENV
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfiles/Dockerfile # 指定Dockerfile路径
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/navigo:${{ env.VERSION }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/navigo:${{ env.VERSION }}-${{ env.BUILD_TS }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/navigo:latest
            
      # ============================
      # Docker Hub 推送结束
      # ============================
      